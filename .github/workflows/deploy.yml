name: Deploy TanStack Start to GitHub Pages

on:
  push:
    branches: ["main"] # Запускать сборку при каждом сохранении в ветку main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: ${{'deployment.outputs.page_url'}} }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun (наш пакетный менеджер)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build
        env:
          VITE_BASE_URL: /style-hub/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Указываем папку, куда TanStack Start складывает готовый статичный HTML
          path: .output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
